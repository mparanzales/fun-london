version: 2

# Dependabot was running with no config, so it opened bumps for everything and
# grouped nothing. PR #141 (sharp 0.33.5 -> 0.35.0) was merged and broke
# typecheck on main, which then stayed red across several merges before anyone
# noticed. This file exists to make that less likely.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

    # One PR per group instead of a drip of individual bumps, so CI failures
    # are attributable and a bad group can be closed in one action.
    groups:
      dev-tooling:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-patches:
        dependency-type: production
        update-types: ["patch"]

    # NOTE ON IGNORES AND SECURITY. An `ignore` here can suppress the version
    # updates that carry a CVE fix, so anything added below must be narrow and
    # must be checked against open Dependabot ALERTS before it goes in.
    #
    # This bit me immediately. sharp was ignored here because 0.35.0 broke
    # typecheck, and 0.35.0 was also the first version to patch four HIGH
    # libvips CVEs. The ignore would have held the repo on a vulnerable sharp
    # indefinitely. 0.35.1 fixed the types export, so the real answer was to
    # move forward to 0.35.3, not to pin backwards. No sharp ignore now.
    ignore:
      # Next.js majors are a deliberate, tested migration, never a drive-by.
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
