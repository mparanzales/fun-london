version: 2

# Dependabot was running with no config, so it opened bumps for everything and
# grouped nothing. PR #141 (sharp 0.33.5 -> 0.35.0) was merged and broke
# typecheck on main, which then stayed red across several merges before anyone
# noticed. This file exists to make that less likely.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

    # One PR per group instead of a drip of individual bumps, so CI failures
    # are attributable and a bad group can be closed in one action.
    groups:
      dev-tooling:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-patches:
        dependency-type: production
        update-types: ["patch"]

    ignore:
      # sharp 0.35.0 added a package.json "exports" map with NO "types"
      # condition. Under our moduleResolution: "bundler", exports wins over the
      # top-level "types" field, so TypeScript cannot resolve sharp's types at
      # all and `tsc --noEmit` fails on scripts/r2-storage.ts. 0.33.5 has no
      # exports map, so the "types" field is honoured and it works.
      #
      # Re-check when upstream ships a "types" condition, then remove this.
      # Verify with `pnpm typecheck` BEFORE merging any sharp bump.
      - dependency-name: sharp
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

      # Next.js majors are a deliberate, tested migration, never a drive-by.
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
