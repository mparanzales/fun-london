name: diag-resend

# THROWAWAY DIAGNOSTIC (delete after use).
# Prints which domains the RESEND_API_KEY secret's account can actually see,
# with each one's status + region, to explain the persistent 422
# "domain is invalid" on the weekly digest. Prints NO secret values, only the
# account's domain list (names/status/region), which is not sensitive.

on:
  workflow_dispatch:

jobs:
  diag:
    name: list domains visible to the configured Resend key
    runs-on: ubuntu-latest
    steps:
      - name: Query Resend /domains with the stored key
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -uo pipefail
          # -s keeps the bearer token out of logs; we never echo the key.
          code=$(curl -s -o resp.json -w "%{http_code}" \
            https://api.resend.com/domains \
            -H "Authorization: Bearer $RESEND_API_KEY")
          {
            echo "## Resend key diagnostic"
            echo ""
            echo "GET /domains -> HTTP $code"
            echo ""
            echo '```'
            python3 - <<'PY'
          import json
          try:
              d = json.load(open("resp.json"))
          except Exception as e:
              print("could not parse response:", e); raise SystemExit(0)
          rows = d.get("data") if isinstance(d, dict) else d
          if not rows:
              print("NO domains visible to this key.")
              print("raw (first 300 chars):", json.dumps(d)[:300])
          else:
              print(f"{len(rows)} domain(s) visible to this key:")
              for x in rows:
                  print(f"  - {x.get('name')} | status={x.get('status')} | region={x.get('region')}")
          PY
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
