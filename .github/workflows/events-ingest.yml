name: events-ingest

# Tier 3 — events pipeline.
#
# Runs scripts/ingest-events.ts every 4 hours. The script walks
# EVENT_SUBSCRIPTIONS in scripts/events-seed.ts, calls each provider
# adapter (Eventbrite / Ticketmaster / Skiddle / DICE), upserts events
# into public.events (idempotent via the (source, source_id) unique
# constraint), and sets cancelled_at on events that have disappeared
# from the provider's response.
#
# Until provider adapters are wired (each behind its own API key — see
# scripts/event-sources/), this workflow runs successfully but produces
# zero events. That's fine: it proves the cron infrastructure works,
# and the moment any single adapter is wired its events start flowing.
#
# Schedule: two interleaved crons, both 30 minutes past the hour and
# offset from the maintenance cron at 03:00 UTC so jobs don't queue
# together. They alternate the ingestion MODE so the events tab always
# has a healthy mix:
#
#   • 00:30 / 04:30 / 08:30 / 12:30 / 16:30 / 20:30 UTC → "curated"
#       Refreshes only the hand-picked independent venues in
#       EVENT_SUBSCRIPTIONS (e.g. Ronnie Scott's). On-brand, on-thesis.
#   • 02:30 / 06:30 / 10:30 / 14:30 / 18:30 / 22:30 UTC → "discovery"
#       "Best of London" — pulls upcoming events from a hand-picked
#       allowlist of independent London venues (Jazz Cafe, KOKO,
#       Hackney Empire, etc. — see LONDON_VENUES in
#       scripts/ingest-events.ts), balanced across categories and
#       trimmed to the top ~15. Local nights out, not tourist
#       musicals. These rows never clobber curated ones — curated
#       rows carry a venue_id, these have venue_id IS NULL.
#
# Net effect: something refreshes every 2 hours, alternating between
# the curated slice and the London-wide slice.
#
# Manual runs (workflow_dispatch) default to "both" so a one-off run
# from the Actions tab refreshes everything at once.
#
# Provider env vars are pre-wired below. Empty values are OK — the
# stubs don't read them. When the maintainer adds e.g. EVENTBRITE_PRIVATE_TOKEN
# to GitHub Actions secrets, the next scheduled run picks it up.

on:
  schedule:
    # Curated slice — independents only.
    # https://crontab.guru/#30_0,4,8,12,16,20_*_*_*
    - cron: "30 0,4,8,12,16,20 * * *"
    # Discovery slice — top ~10 London-wide, balanced.
    # https://crontab.guru/#30_2,6,10,14,18,22_*_*_*
    - cron: "30 2,6,10,14,18,22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - curated
          - discovery

jobs:
  ingest-events:
    name: ingest events from providers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Same Node 22 override as maintenance.yml — Supabase realtime
          # initialises a WebSocket at client construction, native
          # WebSocket arrived in Node 22.4. See maintenance.yml for the
          # full reasoning.
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine ingestion mode
        id: mode
        run: |
          # Scheduled runs branch on which cron fired. The discovery
          # cron runs at the even-but-not-multiple-of-4 hours
          # (02/06/10/14/18/22); everything else is curated. Manual
          # runs use the dispatch input (default "both").
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "30 2,6,10,14,18,22 * * *") MODE="discovery" ;;
              *) MODE="curated" ;;
            esac
          else
            MODE="${{ github.event.inputs.mode }}"
            MODE="${MODE:-both}"
          fi
          echo "Resolved ingestion mode: $MODE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Run events ingestion + render summary
        env:
          # Supabase credentials — required.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Provider API keys — pre-wired. Empty until the maintainer adds them
          # in Settings → Secrets and variables → Actions. The stubs
          # don't read these; real adapters check process.env and
          # throw a clear error if the matching key is missing.
          EVENTBRITE_PRIVATE_TOKEN: ${{ secrets.EVENTBRITE_PRIVATE_TOKEN }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SKIDDLE_API_KEY: ${{ secrets.SKIDDLE_API_KEY }}
        run: |
          set -o pipefail
          pnpm exec tsx scripts/ingest-events.ts --mode=${{ steps.mode.outputs.mode }} 2>&1 | tee ingest-events.log

      - name: Render step summary
        if: always()
        run: |
          {
            echo "## Events ingestion summary"
            echo ""
            echo '```'
            if grep -q "─── SUMMARY ───" ingest-events.log 2>/dev/null; then
              awk '/─── SUMMARY ───/{found=1} found' ingest-events.log
            else
              tail -40 ingest-events.log 2>/dev/null || echo "(no log captured)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
