name: discover-venues

# Tier 2 — autonomous venue discovery (strict, all-Google, free).
#
# Runs scripts/discover-venues.ts every 4 hours. Each run loops a rotating
# slice of the London grid (neighbourhood × category) on Google Places until
# it has up to 10 venues that pass EVERY gate:
#   • operational · rating >= 4.4 · >= 400 reviews · has website · food/drink
#   • NOT a chain (Google Places location count >= 6 = chain — by count, not
#     a denylist)
#   • verifiable in >= 2 trusted publications (Time Out / Infatuation / Eater
#     / Square Meal / Hot Dinners / Harden's / Michelin / Good Food Guide /
#     Condé Nast / Evening Standard / Guardian / Foodism / World's 50 Best),
#     checked by Gemini 2.5 Flash with built-in Google Search
# then the venue is AUTO-PUBLISHED to public.venues with honest TEMPLATED
# copy and editorial_sources: [] — Gemini acts ONLY as the 2-source publish
# gate; it writes no editorial and no sources are persisted (provenance
# honesty, after the fabricated-claims incident).
#
# All-Google + free: Google Places + Gemini (one personal-account key does
# the validation-by-search). No Custom Search / no 3rd party.
#
# Distinct from:
#   • maintenance.yml (Tier 1) — keeps EXISTING venues fresh (daily).
#   • events-ingest.yml (Tier 3) — keeps the Events tab fresh (4-hourly).
#
# Schedule offset to :15 past the odd-4h hours so it never queues with the
# events cron (:30) or the daily maintenance cron (03:00).

on:
  schedule:
    # https://crontab.guru/#15_1,5,9,13,17,21_*_*_*
    - cron: "15 1,5,9,13,17,21 * * *"
  workflow_dispatch:

jobs:
  discover-venues:
    name: discover + auto-publish venues
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write # for the failure-alert step to open/comment an issue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 override — same Supabase realtime / native-WebSocket
          # reason as maintenance.yml and events-ingest.yml.
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run venue discovery + render summary
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Mirror new venue photos to Storage (keyless public URLs) instead
          # of embedding the Places key. Bucket name, not a secret.
          FL_PHOTO_BUCKET: venue-photos
        run: |
          set -o pipefail
          pnpm exec tsx scripts/discover-venues.ts 2>&1 | tee discover-venues.log

      - name: Render step summary
        if: always()
        run: |
          {
            echo "## Venue discovery summary"
            echo ""
            echo '```'
            if grep -q "─── SUMMARY ───" discover-venues.log 2>/dev/null; then
              awk '/─── SUMMARY ───/{found=1} found' discover-venues.log
            else
              tail -40 discover-venues.log 2>/dev/null || echo "(no log captured)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        # cancelled() covers timeout-minutes kills, which are NOT failure()
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🤖 cron failing: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Scheduled run failed: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cron-failure',
              per_page: 100,
            });
            const hit = open.data.find((i) => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: hit.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cron-failure'],
              });
            }
