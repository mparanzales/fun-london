name: discover-venues

# Tier 2 candidate discovery (all-Google, free, human-gated).
#
# Runs scripts/discover-venues.ts every 4 hours. Each run loops a rotating
# slice of the London grid (neighbourhood x category) on Google Places and
# queues up to 3 candidates that pass every numeric gate:
#   - operational, rating >= 4.4, >= 400 reviews, has website, food/drink
#     type allowlist (day-spots get a relaxed bar)
#   - NOT a chain (Google Places brand location count, not a name denylist)
# Candidates land in public.pending_candidates (status "pending") for human
# review at /admin/candidates. NOTHING is auto-published and no generative
# model is involved: the numeric gates plus human approval are the quality
# bar. Approved candidates are published by scripts/ingest-from-pending.ts.
#
# All-Google + free: Google Places only. No Gemini, no Custom Search, no
# third party.
#
# Distinct from:
#   - maintenance.yml (Tier 1) keeps EXISTING venues fresh (daily).
#   - events-ingest.yml (Tier 3) keeps the Events tab fresh (4-hourly).
#
# Schedule offset to :15 past the odd-4h hours so it never queues with the
# events cron (:30) or the daily maintenance cron (03:00).

on:
  schedule:
    # https://crontab.guru/#15_1,5,9,13,17,21_*_*_*
    - cron: "15 1,5,9,13,17,21 * * *"
  workflow_dispatch:

jobs:
  discover-venues:
    name: discover + queue venue candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write # for the failure-alert step to open/comment an issue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 override — same Supabase realtime / native-WebSocket
          # reason as maintenance.yml and events-ingest.yml.
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run venue discovery + render summary
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # No photo/R2 env needed here: photos are fetched and mirrored by
          # ingest-from-pending.ts after a human approves the candidate.
        run: |
          set -o pipefail
          pnpm exec tsx scripts/discover-venues.ts 2>&1 | tee discover-venues.log

      - name: Render step summary
        if: always()
        run: |
          {
            echo "## Venue discovery summary"
            echo ""
            echo '```'
            if grep -q "─── SUMMARY ───" discover-venues.log 2>/dev/null; then
              awk '/─── SUMMARY ───/{found=1} found' discover-venues.log
            else
              tail -40 discover-venues.log 2>/dev/null || echo "(no log captured)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        # cancelled() covers timeout-minutes kills, which are NOT failure()
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🤖 cron failing: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Scheduled run failed: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cron-failure',
              per_page: 100,
            });
            const hit = open.data.find((i) => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: hit.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cron-failure'],
              });
            }
