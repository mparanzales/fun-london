name: weekly-digest

# Weekly "new in London" retention email.
#
# Runs scripts/send-weekly-digest.ts once a week. It emails everyone who opted
# in (profiles.email_weekly_opt_in = true) a short branded round-up of newly
# added venues + events happening this week, via the Resend HTTP API.
#
# Consent + unsubscribe: opt-in is explicit (default off, set in the profile),
# every email carries a one-click unsubscribe link, and the script never sends
# an empty digest.
#
# Schedule: Thursday 09:00 UTC — far enough ahead of the weekend that the
# "on this week" picks are still bookable. Manual runs via the Actions tab.
#
# REQUIRED SECRET — add RESEND_API_KEY in Settings → Secrets and variables →
# Actions (the same Resend API key used for SMTP works). Until it's set the job
# runs green but exits early without sending, so nothing breaks.

on:
  schedule:
    # https://crontab.guru/#0_9_*_*_4
    - cron: "0 9 * * 4"
  workflow_dispatch:
    inputs:
      dry:
        description: "Dry run (build + list recipients, send nothing)"
        required: false
        default: false
        type: boolean

jobs:
  weekly-digest:
    name: send weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write # for the failure-alert step to open/comment an issue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 to match the other data crons (Supabase realtime needs
          # native WebSocket). See maintenance.yml for the full reasoning.
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send weekly digest
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          # Required to actually send. Empty until added as a secret — the
          # script then exits early (green) without sending.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Optional sender override; defaults to "Fun London <hello@funldn.com>".
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then
            pnpm exec tsx scripts/send-weekly-digest.ts --dry 2>&1 | tee digest.log
          else
            pnpm exec tsx scripts/send-weekly-digest.ts 2>&1 | tee digest.log
          fi

      - name: Render step summary
        if: always()
        run: |
          {
            echo "## Weekly digest summary"
            echo ""
            echo '```'
            tail -40 digest.log 2>/dev/null || echo "(no log captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🤖 cron failing: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Scheduled run failed: ${runUrl}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cron-failure',
              per_page: 100,
            });
            const hit = open.data.find((i) => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: hit.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cron-failure'],
              });
            }
