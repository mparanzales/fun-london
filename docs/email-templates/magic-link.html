<!-- Fun London — branded Magic Link email.
     Paste into Supabase → Authentication → Email Templates → "Magic Link".
     {{ .ConfirmationURL }} is Supabase's sign-in link variable. -->
<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">One tap and you're in.</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f0eee9;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:460px;background:#ffffff;border-radius:24px;border:1px solid #e3ddd2;">
            <tr>
              <td style="padding:38px 32px 6px;text-align:center;">
                <img src="https://www.funldn.com/icon.png" width="56" height="56" alt="Fun London" style="border-radius:14px;display:block;margin:0 auto 18px;" />
                <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#1a1409;letter-spacing:-0.02em;">Tap to get in</h1>
                <p style="margin:0 auto;max-width:340px;font-size:15px;line-height:1.55;color:#756c5d;">
                  Here's your one tap link to Fun London. It expires soon and only works once, so use it while it's warm.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px 6px;text-align:center;">
                <table role="presentation" cellpadding="0" cellspacing="0" align="center">
                  <tr>
                    <td bgcolor="#6d28d9" style="border-radius:16px;background:linear-gradient(135deg,#3f51d6,#9b4ddb);">
                      <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:15px 34px;font-size:15px;font-weight:800;color:#ffffff;text-decoration:none;border-radius:16px;">
                        Sign in to Fun London
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 32px 34px;text-align:center;">
                <p style="margin:0;font-size:12px;line-height:1.5;color:#9c958a;">
                  Didn't ask for this? Just ignore it, no harm done.
                </p>
              </td>
            </tr>
          </table>
          <p style="margin:20px auto 0;max-width:460px;font-size:12px;line-height:1.5;color:#9c958a;text-align:center;">
            The independent London worth leaving the house for.<br />
            <span style="color:#bcb4a6;">Fun London &middot; funldn.com</span>
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
